<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Dashboard Project</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1 class="main-title">JavaScript API Dashboard</h1>
    <div class="grid-container">
    <section class="grid-item" id="dog-api">
        <h2>🐶 Random Dog</h2>
        <button id="dog-button" onclick="getDogImage()">Get Dog</button>
        <div class="output" id="dog-output"></div>
    </section>

    <section class="grid-item" id="cat-api">
        <h2>🐱 Random Cat</h2>
        <button id="cat-button" onclick="getCatImage()">Get Cat</button>
        <div class="output" id="cat-output"></div>
    </section>

    <section class="grid-item" id="weather-api">
        <h2>☀️ Weather Info</h2>
        <button id="weather-button" onclick="getWeather()">Get Weather</button>
        <input class="input" id="weather-input" placeholder="US Zip Code" maxlength="5" required></input>
        <div class="output" id="weather-output"></div>
    </section>

    <section class="grid-item" id="currency-api">
        <h2>💱 Currency Rates</h2>
        <div class="currency-selections">
            <label for="currency-from">From</label>
            <select name="currency-from" id="currency-from"></select>

            <label for="currency-to">To</label>
            <select name="currency-to" id="currency-to"></select>
        </div>
        <button id="exchange-button" onclick="getExchangeRates()">Get Rates</button>
        <div class="output" id="currency-output"></div>
    </section>

    <section class="grid-item" id="movies-api">
        <h2>🎮 Trending Movies</h2>
        <button id="movie-button" onclick="getMovies()">Get Movies</button>
        <div class="output" id="movies-output">
            <ul id="movie-list"></ul>
        </div>
    </section>

    <section class="grid-item" id="github-api">
        <h2>🧑‍💻 GitHub User</h2>
        <button id="github-button" onclick="getGitHubUser()">Get User</button>
        <input id="github-user-input" placeholder="Username" required></input>
        <div class="output" id="github-output"></div>
    </section>

    <section class="grid-item" id="joke-api">
        <h2>🤣 Random Joke</h2>
        <button id="joke-button" onclick="getJoke()">Get Joke</button>
        <div class="output" id="joke-output"></div>
    </section>

    <section class="grid-item" id="apod-api">
        <h2>💫 Random Quote</h2>
        <button id="quote-api-button" onclick="getQuote()">Get Inspired</button>
        <div class="output" id="quote-api-output"></div>
    </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
